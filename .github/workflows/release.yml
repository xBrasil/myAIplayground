name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build the Windows installer for (e.g. v1.8)'
        required: true

permissions:
  contents: write

jobs:
  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for release notes)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run pre-release checks
        run: PYTHONIOENCODING=utf-8 python3 scripts/test.py

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          # Find the previous tag (the one before this release)
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            # First release ever — use all commits
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..${{ github.ref_name }}"
          fi

          echo "Generating notes for range: ${PREV_TAG:-<initial>} → ${{ github.ref_name }}"

          # Collect commits in the range
          COMMITS=$(git log "$RANGE" --pretty=format:"%s" --no-merges 2>/dev/null || git log --pretty=format:"%s" --no-merges)

          # Helper: extract lines matching a prefix, strip the prefix
          extract() {
            echo "$COMMITS" | grep -iE "^$1" | sed -E "s/^[^:]+: //" | sed 's/^/- /'
          }

          FEATURES=$(extract "feat")
          FIXES=$(extract "fix")
          CHORES=$(extract "chore|build|ci|docs|refactor|perf|style|test")

          BODY=""

          if [ -n "$FEATURES" ]; then
            BODY="${BODY}## ✨ Novidades\n${FEATURES}\n\n"
          fi

          if [ -n "$FIXES" ]; then
            BODY="${BODY}## 🐛 Correções\n${FIXES}\n\n"
          fi

          if [ -n "$CHORES" ]; then
            BODY="${BODY}## 🔧 Melhorias internas\n${CHORES}\n\n"
          fi

          if [ -z "$BODY" ]; then
            BODY="Veja os commits para detalhes das alterações.\n"
          fi

          # Write to file (avoids quoting issues with multiline)
          printf "%b" "$BODY" > release_notes.md
          echo "notes_file=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Build release ZIP
        run: python3 scripts/release.py -o "my-ai-playground-${{ github.ref_name }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: My AI Playground ${{ github.ref_name }}
          body_path: release_notes.md
          generate_release_notes: true
          files: "my-ai-playground-${{ github.ref_name }}.zip"

  windows-installer:
    runs-on: windows-latest
    needs: [release]
    # Run after a successful release job, OR directly via workflow_dispatch (release is skipped)
    if: always() && (needs.release.result == 'success' || needs.release.result == 'skipped')
    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          $v = (Get-Content VERSION -Raw).Trim().Split()[0]
          "version=$v" | Out-File -Append -FilePath $env:GITHUB_OUTPUT

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          $repoDir = (Get-Location).Path
          # Ensure Inno Setup is on PATH
          $env:Path += ";C:\Program Files (x86)\Inno Setup 6"
          iscc /DAppVer=$version /DRepoDir=$repoDir scripts\installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: "releases/my-ai-playground-v${{ steps.ver.outputs.version }}-setup.exe"
